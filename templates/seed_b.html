<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Black Hole Survival - Arcade Edition</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #020205;
        }

        /* 80s Arcade HUD */
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #00ffff;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.4em;
            pointer-events: none;
            text-shadow: 0 0 8px #00ffff;
        }

        /* Dynamic Graze/Near Miss Indicator */
        #graze-ui {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ff00ff;
            font-family: 'Courier New', Courier, monospace;
            font-size: 2em;
            font-weight: bold;
            text-shadow: 0 0 10px #ff00ff;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.1s ease-out;
        }

        #game-over, #start-screen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ff3300;
            text-align: center;
            font-size: 3em;
            font-family: 'Courier New', Courier, monospace;
            text-shadow: 0 0 10px #ff0000;
            background: rgba(0, 0, 0, 0.8);
            padding: 40px;
            border: 2px solid #ff3300;
        }

        #start-screen {
            color: #00ffff;
            text-shadow: 0 0 10px #00ffff;
            border: 2px solid #00ffff;
        }

        #game-over { display: none; }

        button {
            margin-top: 20px;
            padding: 10px 20px;
            background: #00ffff;
            color: #000;
            border: none;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.4em;
            cursor: pointer;
            pointer-events: auto;
            font-weight: bold;
            text-transform: uppercase;
        }

        button:hover { background: #fff; }

        #game-over button { background: #ff3300; }
        #game-over button:hover { background: #fff; }

        #controls {
            margin-top: 15px;
            font-size: 0.7em;
            color: #00ff88;
            text-shadow: 0 0 5px #00ff88;
        }

        /* Kinetic Camera Shake */
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }
        .shake { animation: shake 0.2s; animation-iteration-count: infinite; }
    </style>
</head>
<body>
    <div id="start-screen">
        INSERT COIN<br>
        <button id="btnStart">Initialize Audio & Start</button>
    </div>

    <div id="ui" style="display:none;">
        <div>ALTITUDE: <span id="distVal">40</span></div>
        <div>SCORE: <span id="scoreVal">0</span></div>
        <div id="controls">
            [A/D or LEFT/RIGHT]: Orbit | [W or UP]: Thrust<br>
            [SPACE]: Fire Homing Laser
        </div>
    </div>

    <div id="graze-ui">GRAZE! +50</div>

    <div id="game-over">
        SINGULARITY REACHED<br>
        <button id="btnRestart">Go Again</button>
    </div>

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
        }
      }
    </script>

    <script type="module" src="static/js/seed_b/main.js"></script>
</body>
</html>
