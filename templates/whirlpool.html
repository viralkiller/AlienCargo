<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vortex Cycle Engine</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        canvas { display: block; }
        #ui-layer {
            position: absolute; top: 20px; left: 20px;
            color: #00ffcc; font-family: 'Courier New', Courier, monospace;
            pointer-events: none; z-index: 10;
            background: rgba(0,0,0,0.85); padding: 15px; border: 1px solid #00ffcc;
            min-width: 250px;
        }
        .stat-row { display: flex; justify-content: space-between; margin-bottom: 5px; }
        .val { font-weight: bold; }
        .limit-reached { color: #ff3333; }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.60.0/phaser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="ui-layer">
        <h3 style="margin-top:0; border-bottom: 1px solid #444; padding-bottom: 10px;">VORTEX CYCLE ENGINE</h3>
        <div class="stat-row">
            <span class="label">Matter Count:</span>
            <span class="val" style="color: #00ffcc;">100,000</span>
        </div>
        <div class="stat-row">
            <span class="label">Sinks:</span>
            <span class="val" id="sink-count">0 / 3</span>
        </div>
        <div class="stat-row">
            <span class="label">Status:</span>
            <span class="val" id="sim-status">Equilibrium</span>
        </div>
        <small style="color: #666; display: block; margin-top: 10px;">Left Click to Open Hole</small>
    </div>

    <script>
    // --- CONFIGURATION ---
    const CONFIG = {
        pointCount: 100000,
        worldSize: 380,         // Width of the ocean
        sinkRadius: 10.0,       // THE KILL ZONE (Inner Ring)
        gravity: 1000.0,        // Strong pull
        friction: 0.96,         // Drag
        pointSize: 1.4,
        maxSinks: 3,

        // Physics Thresholds
        flushDist: 35.0         // Distance where Spin stops and Suction takes over
    };

    // --- THREE.JS ENGINE ---
    class CycleOcean {
        constructor() {
            this.scene = new THREE.Scene();
            this.scene.background = new THREE.Color(0x000000);
            this.scene.fog = new THREE.FogExp2(0x000000, 0.0025);

            this.camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            this.camera.position.set(0, 180, 180);
            this.camera.lookAt(0, 0, 0);

            this.renderer = new THREE.WebGLRenderer({ antialias: false });
            this.renderer.setSize(window.innerWidth, window.innerHeight);
            this.renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(this.renderer.domElement);

            this.raycaster = new THREE.Raycaster();
            this.planeMat = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
            this.sinks = [];

            this.initPoints();
        }

        initPoints() {
            this.geometry = new THREE.BufferGeometry();

            this.positions = new Float32Array(CONFIG.pointCount * 3);
            this.colors = new Float32Array(CONFIG.pointCount * 3);
            this.velocities = new Float32Array(CONFIG.pointCount * 3);

            for (let i = 0; i < CONFIG.pointCount; i++) {
                this.spawnPoint(i, true);
            }

            this.geometry.setAttribute('position', new THREE.BufferAttribute(this.positions, 3));
            this.geometry.setAttribute('color', new THREE.BufferAttribute(this.colors, 3));

            const material = new THREE.PointsMaterial({
                size: CONFIG.pointSize,
                vertexColors: true,
                sizeAttenuation: true,
                transparent: true,
                opacity: 0.9,
                blending: THREE.AdditiveBlending
            });

            this.points = new THREE.Points(this.geometry, material);
            this.scene.add(this.points);
        }

        /**
         * Teleports particle 'i' to the outer edge of the world.
         */
        spawnPoint(i, randomStart = false) {
            const half = CONFIG.worldSize / 2;
            let x, z;

            if (randomStart) {
                // Scatter everywhere initially
                x = (Math.random() - 0.5) * CONFIG.worldSize;
                z = (Math.random() - 0.5) * CONFIG.worldSize;
            } else {
                // SPAWN ON EDGE (The "Regeneration" Phase)
                const side = Math.floor(Math.random() * 4);
                // Random drift along the edge
                const spread = (Math.random() - 0.5) * CONFIG.worldSize;
                const push = 10; // Spawn slightly outside view to drift in smoothly

                switch(side) {
                    case 0: x = spread; z = -half - push; break; // Top
                    case 1: x = spread; z = half + push; break;  // Bottom
                    case 2: x = -half - push; z = spread; break; // Left
                    case 3: x = half + push; z = spread; break;  // Right
                }
            }

            const ix = i * 3;
            this.positions[ix] = x;
            this.positions[ix+1] = 0;
            this.positions[ix+2] = z;

            // Reset Velocity (Gentle drift inward)
            this.velocities[ix] = -x * 0.0005;
            this.velocities[ix+1] = 0;
            this.velocities[ix+2] = -z * 0.0005;

            // Reset Color (Dark Ocean Blue)
            this.colors[ix] = 0.0;
            this.colors[ix+1] = 0.2;
            this.colors[ix+2] = 0.5;
        }

        addSink(ndc) {
            if (this.sinks.length >= CONFIG.maxSinks) return false;
            this.raycaster.setFromCamera(ndc, this.camera);
            const target = new THREE.Vector3();
            this.raycaster.ray.intersectPlane(this.planeMat, target);
            if (target) {
                this.sinks.push({ x: target.x, z: target.z });
                return true;
            }
            return false;
        }

        update(time) {
            const t = time * 0.001;
            const activeSinks = this.sinks.length > 0;
            const dt = 0.016;

            const pos = this.positions;
            const vel = this.velocities;
            const col = this.colors;

            // Pre-calc kill radius squared for speed
            const killDistSq = CONFIG.sinkRadius * CONFIG.sinkRadius;
            const flushDistSq = CONFIG.flushDist * CONFIG.flushDist;

            for (let i = 0; i < CONFIG.pointCount; i++) {
                let ix = i * 3;
                let iy = ix + 1;
                let iz = ix + 2;

                let px = pos[ix];
                let py = pos[iy];
                let pz = pos[iz];
                let vx = vel[ix];
                let vz = vel[iz];

                if (activeSinks) {
                    let closestDistSq = Infinity;
                    let speedSq = vx*vx + vz*vz;

                    for (let s of this.sinks) {
                        const dx = s.x - px;
                        const dz = s.z - pz;
                        const distSq = dx*dx + dz*dz;

                        if (distSq < closestDistSq) closestDistSq = distSq;

                        const dist = Math.sqrt(distSq);

                        // --- PHYSICS FORCE FIELD ---

                        // 1. Gravity (Always pulling)
                        const force = CONFIG.gravity / (dist + 5.0);

                        // 2. Vector Components
                        const nx = dx / dist; // Inward
                        const nz = dz / dist;
                        const tx = -nz;       // Spin (Tangent)
                        const tz = nx;

                        // 3. Dynamic Bias (The "Anti-Ring" Logic)
                        let suction = 0.3; // Default: low suction, high spin (makes a ring)
                        let spin = 0.7;

                        // IF CLOSE: KILL SPIN, MAX SUCTION
                        // This forces them to cross the line instead of orbiting forever
                        if (dist < CONFIG.flushDist) {
                            // Interpolate: As we get closer to 0, suction goes to 1.0, spin goes to 0.0
                            const ratio = dist / CONFIG.flushDist; // 0.0 (close) to 1.0 (far)
                            suction = 1.0 - (ratio * 0.5);
                            spin = ratio * 0.8;
                        }

                        // Apply
                        vx += (nx * force * suction + tx * force * spin) * dt;
                        vz += (nz * force * suction + tz * force * spin) * dt;
                    }

                    vx *= CONFIG.friction;
                    vz *= CONFIG.friction;
                    px += vx;
                    pz += vz;

                    // Funnel Depth
                    py = -800.0 / (closestDistSq + 15.0);

                    // --- COLOR MAPPING ---
                    // Surface (Far): Dark Blue
                    // Ring (Mid): Cyan/White (Speed)
                    // Throat (Close): Red/Black (Death Warning)

                    if (closestDistSq < flushDistSq) {
                        // DEATH ZONE COLORS
                        col[ix] = 1.0;   // Red
                        col[iy] = 0.0;   // Green
                        col[iz] = 0.2;   // Blue
                    } else {
                        // NORMAL OCEAN COLORS
                        const speed = Math.sqrt(speedSq);
                        const intensity = Math.min(speed * 0.3, 1.0);
                        col[ix] = intensity * 0.7;
                        col[iy] = 0.2 + intensity * 0.8;
                        col[iz] = 0.5 + intensity * 0.5;
                    }

                    // --- KILL & RESPAWN ---
                    if (closestDistSq < killDistSq) {
                        this.spawnPoint(i);
                        // Reset local variables instantly so we render the NEW position
                        px = pos[ix]; py = 0; pz = pos[iz];
                        vx = vel[ix]; vz = vel[iz];
                    }

                } else {
                    // Passive wave
                    py = Math.sin(px * 0.05 + t) * Math.cos(pz * 0.05 + t) * 3.0;
                    col[ix]=0; col[iy]=0.2; col[iz]=0.5;
                }

                // Bounds Cleanup (If flung out)
                if (Math.abs(px) > CONFIG.worldSize * 0.7 || Math.abs(pz) > CONFIG.worldSize * 0.7) {
                    this.spawnPoint(i);
                    px = pos[ix]; py = 0; pz = pos[iz];
                }

                pos[ix] = px; pos[iy] = py; pos[iz] = pz;
                vel[ix] = vx; vel[iz] = vz;
            }

            this.geometry.attributes.position.needsUpdate = true;
            this.geometry.attributes.color.needsUpdate = true;
            this.renderer.render(this.scene, this.camera);
        }

        resize(w, h) {
            this.camera.aspect = w / h;
            this.camera.updateProjectionMatrix();
            this.renderer.setSize(w, h);
        }
    }

    // --- PHASER CONTROLLER ---
    class MainScene extends Phaser.Scene {
        constructor() { super({ key: 'MainScene' }); }

        create() {
            this.ocean = new CycleOcean();

            this.input.on('pointerdown', (pointer) => {
                const ndc = {
                    x: (pointer.x / window.innerWidth) * 2 - 1,
                    y: -(pointer.y / window.innerHeight) * 2 + 1
                };

                if (this.ocean.addSink(ndc)) {
                    this.updateUI();
                } else {
                    if (this.ocean.sinks.length >= CONFIG.maxSinks) {
                        const status = document.getElementById('sim-status');
                        status.innerText = "MAX ENTROPY";
                        status.className = "val limit-reached";

                        this.tweens.addCounter({
                            from: 0, to: 1, duration: 200, yoyo: true,
                            onUpdate: () => { document.body.style.borderColor = "#ff0000"; }
                        });
                    }
                }
            });

            window.addEventListener('resize', () => {
                this.ocean.resize(window.innerWidth, window.innerHeight);
                this.scale.resize(window.innerWidth, window.innerHeight);
            });
        }

        updateUI() {
            const count = this.ocean.sinks.length;
            document.getElementById('sink-count').innerText = `${count} / ${CONFIG.maxSinks}`;
            document.getElementById('sim-status').innerText = "Cycle Active";
            document.getElementById('sim-status').className = "val";
        }

        update(time, delta) {
            if (this.ocean) this.ocean.update(time);
        }
    }

    const config = {
        type: Phaser.WEBGL,
        width: window.innerWidth,
        height: window.innerHeight,
        transparent: true,
        scene: MainScene,
        canvasStyle: "position: absolute; top: 0; left: 0; z-index: 5;"
    };

    const game = new Phaser.Game(config);

    </script>
</body>
</html>
