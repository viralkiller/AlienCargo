<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alien Cargo - Game Generator</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 10px;
            height: 100vh;
            box-sizing: border-box;
            overflow: hidden;
        }
        h1 {
            color: #00d2ff;
            margin: 5px 0 0 0;
            font-size: 24px;
        }
        p.subtitle {
            color: #aaaaaa;
            margin: 5px 0 10px 0;
            font-size: 14px;
        }
        #generator-ui {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 10px;
        }
        textarea {
            width: 100%;
            height: 60px;
            padding: 10px;
            font-size: 14px;
            font-family: inherit;
            background-color: #1e1e1e;
            color: #ffffff;
            border: 1px solid #333;
            border-radius: 8px;
            resize: none;
            box-sizing: border-box;
        }
        textarea:focus {
            outline: none;
            border-color: #00d2ff;
        }
        button {
            padding: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            background: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%);
            color: #ffffff;
            border: none;
            border-radius: 8px;
            transition: opacity 0.2s, transform 0.1s;
        }
        button:hover {
            opacity: 0.9;
        }
        button:active {
            transform: scale(0.98);
        }
        button:disabled {
            background: #555555;
            color: #888888;
            cursor: not-allowed;
            transform: none;
        }
        /* Container scales dynamically. */
        #game-container {
            flex: 1;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 0;
            overflow: hidden;
            position: relative;
        }
        /* Lock aspect ratio. */
        #game-wrapper {
            background-color: #000000;
            border: 2px solid #333;
            border-radius: 4px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            aspect-ratio: 16/9;
            height: 100%;
            max-width: 100%;
            overflow: hidden;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 4px;
            background-color: #000;
            display: block;
            overflow: hidden;
        }
        /* Overlay loading screen. */
        #loading {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 15px;
            color: #00d2ff;
            font-size: 18px;
            font-weight: bold;
            z-index: 10;
        }
        .spinner {
            width: 30px;
            height: 30px;
            border: 4px solid rgba(0, 210, 255, 0.3);
            border-radius: 50%;
            border-top-color: #00d2ff;
            animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <h1>Alien Cargo 🛸</h1>
    <p class="subtitle">AI-Powered Instant Game Generator</p>
    <div id="generator-ui">
        <textarea id="game-desc" placeholder="Describe your game... (e.g., A top-down space shooter where you defend cargo ships from alien swarms)"></textarea>
        <button id="create-btn">Create Game</button>
    </div>
    <div id="game-container">
        <div id="game-wrapper">
            <div id="loading">
                <div class="spinner"></div>
                <span>Compiling game logic...</span>
            </div>
            <iframe id="game-frame" sandbox="allow-scripts" scrolling="no"></iframe>
        </div>
    </div>
    <script>
        // Use local Flask API route.
        const FLASK_API_URL = "/generate_game";

        // Build dynamic JS controls banner.
        function createControlsBanner() {
            console.log("UI Event: Building JS controls banner.");

            // Create banner container element.
            const banner = document.createElement('div');
            banner.id = 'controls-banner';

            // Apply JS styling to banner.
            banner.style.position = 'absolute';
            banner.style.top = '10px';
            banner.style.left = '50%';
            banner.style.transform = 'translateX(-50%)';
            banner.style.backgroundColor = 'rgba(0, 0, 0, 0.8)';
            banner.style.color = '#00d2ff';
            banner.style.padding = '8px 16px';
            banner.style.borderRadius = '20px';
            banner.style.fontSize = '12px';
            banner.style.display = 'flex';
            banner.style.gap = '15px';
            banner.style.alignItems = 'center';
            banner.style.zIndex = '20';
            banner.style.border = '1px solid #00d2ff';

            // Create controls text content.
            const text = document.createElement('span');
            text.innerHTML = '<b>PC:</b> Arrows (Move), Space (Action), Enter (Start) | <b>Mobile:</b> Swipe (Move), Tap (Action), Double-Tap (Start)';

            // Create close button.
            const closeBtn = document.createElement('button');
            closeBtn.innerText = 'X';

            // Apply JS styling to button.
            closeBtn.style.background = 'transparent';
            closeBtn.style.border = 'none';
            closeBtn.style.color = '#ff4444';
            closeBtn.style.cursor = 'pointer';
            closeBtn.style.fontWeight = 'bold';
            closeBtn.style.padding = '0';

            // Handle close button click.
            closeBtn.addEventListener('click', () => {
                console.log("UI Event: Controls banner closed.");
                banner.style.display = 'none';
            });

            // Append elements to DOM.
            banner.appendChild(text);
            banner.appendChild(closeBtn);
            document.getElementById('game-container').appendChild(banner);
            console.log("DOM Event: Controls banner attached.");
        }

        // Handle loading locally saved game.
        document.addEventListener('DOMContentLoaded', () => {
            console.log("LifeCycle Event: DOM Content Loaded.");
            const savedGame = localStorage.getItem('alien_cargo_last_game');
            const savedDesc = localStorage.getItem('alien_cargo_last_desc');

            if (savedDesc) {
                console.log("Storage Event: Restoring game description.");
                document.getElementById('game-desc').value = savedDesc;
            }
            if (savedGame) {
                console.log("Storage Event: Loading saved game HTML.");
                const iframe = document.getElementById('game-frame');
                iframe.srcdoc = savedGame;
            }

            // Initialize the controls banner.
            createControlsBanner();
        });

        // Handle textarea input logging.
        document.getElementById('game-desc').addEventListener('input', () => {
             console.log("UI Event: Textarea input modified.");
        });

        // Handle button click logic.
        document.getElementById('create-btn').addEventListener('click', async () => {
            console.log("UI Event: 'Create Game' button clicked.");
            const descInput = document.getElementById('game-desc').value.trim();
            console.log(`Data Event: Input length: ${descInput.length}`);

            if (!descInput) {
                console.warn("Validation Event: Empty description blocked.");
                alert("Please describe your game first!");
                return;
            }

            const btn = document.getElementById('create-btn');
            const loading = document.getElementById('loading');
            const iframe = document.getElementById('game-frame');

            // Update UI state to loading.
            console.log("UI State: Disabling button, showing loader.");
            btn.disabled = true;
            btn.innerText = "Generating...";
            loading.style.display = 'flex';

            // Clear previous game iframe.
            console.log("UI State: Cleared previous iframe source.");
            iframe.srcdoc = "";

            // Prepare request payload.
            const payload = { description: descInput };
            console.log("Network Event: POST request initiated.", FLASK_API_URL);

            try {
                const response = await fetch(FLASK_API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                console.log(`Network Event: Response status: ${response.status}`);

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const data = await response.json();
                console.log("Data Event: JSON payload parsed.");

                if (data.error) {
                    throw new Error(data.error);
                }

                // Inject generated game HTML.
                console.log("UI State: Injecting HTML into iframe.");
                iframe.srcdoc = data.game_html;

                // Save state to local storage.
                localStorage.setItem('alien_cargo_last_game', data.game_html);
                localStorage.setItem('alien_cargo_last_desc', descInput);
                console.log("Storage Event: Saved game state locally.");

            } catch (error) {
                console.error("Error Event: API communication failed.", error);
                alert("Failed to generate game. Check console for details.");
            } finally {
                // Restore UI ready state.
                console.log("UI State: Restoring interface layout.");
                btn.disabled = false;
                btn.innerText = "Create Game";
                loading.style.display = 'none';

                // Ensure banner is visible again.
                const banner = document.getElementById('controls-banner');
                if (banner && banner.style.display === 'none') {
                    console.log("UI Event: Resetting banner visibility.");
                    banner.style.display = 'flex';
                }
            }
        });
    </script>
</body>
</html>
