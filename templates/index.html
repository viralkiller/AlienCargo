{% extends "base.html" %}
{% block head %}
<style>
    #app-container {
        display: flex;
        flex-direction: row-reverse; /* Defaults to Prompt Area on left, toggle on right */
        width: 100vw;
        height: calc(100vh - 48px); /* Account for top bar */
        margin-top: 48px;
        overflow: hidden;
    }

    #toggle-btn {
        background: #3a7bd5;
        color: #fff;
        border: none;
        cursor: pointer;
        font-weight: bold;
        font-size: 20px;
        z-index: 100;
        height: 100%;
        width: 40px; /* Fixed width prevents grid-crushing */
        flex-shrink: 0;
    }
    #toggle-btn:hover { background: #00d2ff; }
    iframe {
        border: none;
        background-color: #000;
        outline: none;
        width: 100%;
        height: 100%;
    }
    #prompt-area {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 20px;
        box-sizing: border-box;
        position: relative;
        flex-grow: 1;
        width: calc(100vw - 40px);
    }
    #game-desc {
        width: 100%;
        max-width: 600px;
        height: 120px;
        margin-bottom: 15px;
        background: #1e1e1e;
        color: #fff;
        padding: 10px;
        border: 1px solid #333;
    }
    #create-btn {
        padding: 10px 20px;
        background: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%);
        color: #fff;
        border: none;
        cursor: pointer;
        font-weight: bold;
    }
    #game-area {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #000;
        flex-grow: 1;
        width: calc(100vw - 40px);
        min-width: 0;
        /* Critical for flex shrinking */
        min-height: 0;
    }
    #game-frame {
        width: 100%;
        height: 100%;
        max-width: 1280px;
        max-height: 720px;
        box-shadow: 0 0 20px rgba(0, 210, 255, 0.2);
    }
</style>
{% endblock %}
{% block content %}
<div id="app-container">
    <button id="toggle-btn" title="Toggle View">&lt;</button>
    <div id="prompt-area">
        <h1 style="color: #00d2ff; margin-bottom: 5px;">Alien Cargo 🛸</h1>
        <p style="color: #aaa; margin-top: 0;">AI-Powered Instant Game Generator</p>
        <textarea id="game-desc" placeholder="Describe your game..." maxlength="2000"></textarea>
        <button id="create-btn">Create Game</button>
        <div id="loading" style="display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.9); color: #00d2ff; flex-direction: column; justify-content: center; align-items: center; z-index: 10;">
            <h2 id="loading-text" style="margin-bottom: 20px;">Engaging Hyperdrive...</h2>
            <div id="progress-container" style="width: 80%; max-width: 400px; height: 12px; background: #222; border-radius: 6px; overflow: hidden; border: 1px solid #333;">
                <div id="progress-bar" style="width: 0%; height: 100%; background: linear-gradient(90deg, #00d2ff, #3a7bd5); transition: width 0.3s ease;"></div>
            </div>
            <p id="status-update" style="margin-top: 15px; color: #666; font-size: 12px;">Syncing with AIManager...</p>
        </div>
    </div>
    <div id="game-area" style="display: none;">
        <iframe id="game-frame" tabindex="0" src="about:blank"></iframe>
    </div>
</div>
<script>
    const FLASK_API_URL = "/generate_game";

    // Safely inject the pre-loaded game from the backend
    const initialGameHTML = {{ initial_game_html | default('""') | tojson | safe }};
    let isGameView = false;

    const BACKEND_AVG_TIME = {{ avg_time|default(15000)|int }};
    const appContainer = document.getElementById('app-container');
    const toggleBtn = document.getElementById('toggle-btn');
    const promptArea = document.getElementById('prompt-area');
    const gameArea = document.getElementById('game-area');
    const iframe = document.getElementById('game-frame');

    const createBtn = document.getElementById('create-btn');
    const progressBar = document.getElementById('progress-bar');
    const loadingOverlay = document.getElementById('loading');
    const descInputBox = document.getElementById('game-desc');
    descInputBox.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            console.log("UI Event: Enter pressed in description box - triggering create button");
            e.preventDefault();
            createBtn.click();
        }
    });
    function forceGameFocus() {
        if (!isGameView || !iframe) return;
        console.log("UI Event: Forcing focus into iframe.");
        iframe.focus();
        if (iframe.contentWindow) {
            iframe.contentWindow.focus();
            iframe.contentWindow.postMessage({ type: 'engine_focus' }, '*');
        }
    }
    document.addEventListener('click', (e) => {
        console.log(`UI Event: Parent click. Tag: ${e.target.tagName}, ID: ${e.target.id}`);
    });
    descInputBox.addEventListener('input', () => {
        console.log(`UI Event: Description input changed. Length: ${descInputBox.value.length}`);
    });
    window.addEventListener('keydown', (e) => {
        console.log(`UI Event: Parent received keydown: ${e.key}`);
        if (document.activeElement === descInputBox || document.activeElement === createBtn || !isGameView) {
            console.log(`Input Bridge: Allowing native handling for ${e.key}`);
            return;
        }
        if (isGameView && document.activeElement !== iframe) {
            console.log(`Input Bridge: Transferring focus to game without synthetic events.`);
            forceGameFocus();
        }
    });
    function updateViewState() {
        console.log(`UI Event: View state -> Game:${isGameView}`);
        if (isGameView) {
            toggleBtn.innerHTML = '&gt;';
            promptArea.style.display = 'none';
            gameArea.style.display = 'flex';
            appContainer.style.flexDirection = 'row'; // Toggle left, Game right
            requestAnimationFrame(() => {
                setTimeout(forceGameFocus, 10);
                setTimeout(forceGameFocus, 300);
            });
        } else {
            toggleBtn.innerHTML = '&lt;';
            promptArea.style.display = 'flex';
            gameArea.style.display = 'none';
            appContainer.style.flexDirection = 'row-reverse'; // Toggle right, Prompt left
        }
    }
    console.log("UI Event: Initial view state computation.");

    // Auto-load logic
    if (initialGameHTML && initialGameHTML.trim() !== "") {
        console.log("UI Event: Found recent game history, loading into iframe immediately.");
        isGameView = true;
        updateViewState();
        setTimeout(() => {
            iframe.srcdoc = initialGameHTML;
            forceGameFocus();
        }, 100);
    } else {
        updateViewState();
    }

    toggleBtn.addEventListener('click', () => {
        console.log("UI Event: View toggle button clicked.");
        isGameView = !isGameView;
        updateViewState();
    });
    iframe.onload = () => {
        console.log("UI Event: Iframe loaded fully.");
    };
    createBtn.addEventListener('click', async () => {
        const descInput = descInputBox.value.trim();
        console.log(`UI Event: Create Game clicked. Input length: ${descInput.length}`);
        if (!descInput) {
            console.warn("Validation Error: Description box is empty.");
            alert("Describe the game first, captain!");
            return;
        }

        createBtn.disabled = true;
        createBtn.innerText = "Generating...";
        loadingOverlay.style.display = 'flex';
        iframe.srcdoc = "";
        progressBar.style.width = '0%';
        console.log("UI Event: Showing loading overlay.");
        let startTime = Date.now();
        let progressInterval = setInterval(() => {
            let elapsed = Date.now() - startTime;

            let progress = Math.min(98, (elapsed / BACKEND_AVG_TIME) * 100);
            progressBar.style.width = `${progress}%`;
            if (progress > 80) {
                document.getElementById('status-update').innerText = "Almost there... finalizing code.";
            }
        }, 200);
        try {
            console.log("Network Event: Fetching generated game from AI backend.");
            const response = await fetch(FLASK_API_URL, {
                method: 'POST',
                credentials: 'same-origin',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ description: descInput })
            });
            const data = await response.json();
            if (!response.ok) {
                console.error(`Network Error: ${response.status} - ${data.error}`);
                if (response.status === 401) window.location.href = "{{ url_for('auth.login') }}";
                if (response.status === 403) window.location.href = "{{ url_for('billing.tiers') }}";
                throw new Error(data.error || "Generation failed.");
            }
            console.log("Network Event: Game generated successfully.");
            clearInterval(progressInterval);
            progressBar.style.width = '100%';
            loadingOverlay.style.display = 'none';
            const navCredits = document.getElementById('credit-amount');
            if (navCredits && data.credits_remaining !== undefined) {
                console.log(`UI Event: Updating credits to ${data.credits_remaining}.`);
                navCredits.innerText = data.credits_remaining + " Credits";
            }
            console.log("UI Event: Transitioning view state to Game View BEFORE injecting HTML.");
            isGameView = true;
            updateViewState();
            setTimeout(() => {
                console.log("UI State: Injecting raw HTML into visible iframe.");
                iframe.srcdoc = data.game_html;
                console.log("UI Event: Game injection complete. Firing forced focus.");
                forceGameFocus();
            }, 50);
        } catch (error) {
            console.error("System Error: Game generation caught exception.", error);
            clearInterval(progressInterval);
            alert(error.message);
            loadingOverlay.style.display = 'none';
        } finally {
            console.log("UI Event: Resetting create button state.");
            createBtn.disabled = false;
            createBtn.innerText = "Create Game";
        }
    });
    gameArea.addEventListener('mousedown', () => {
        console.log("UI Event: Game area padding clicked.");
        forceGameFocus();
    });
</script>
<script src="[https://loginmanager.pythonanywhere.com/static/js/fingerprint.js](https://loginmanager.pythonanywhere.com/static/js/fingerprint.js)"></script>
<script>
    document.addEventListener('DOMContentLoaded', async () => {
        // Added UI Interaction Logging for text area focus states
        const descInputBox = document.getElementById('game-desc');
        if (descInputBox) {
            descInputBox.addEventListener('focus', () => console.log('UI Event: Description input focused.'));
            descInputBox.addEventListener('blur', () => console.log('UI Event: Description input lost focus.'));
        }

        if (typeof gatherFingerprintData === 'function') {
            // [FIX] Prevent spamming the LoginManager on every single page load to reduce overload
            if (sessionStorage.getItem('fp_reported') === 'true') {
                console.log("Security Event: Fingerprint already reported this session. Skipping to reduce LoginManager load.");
                return;
            }

            try {
                const email = "{{ session.get('email', '') }}";
                const fpData = await gatherFingerprintData(email);
                await fetch('/billing/report_standard', {
                    method: 'POST',
                    credentials: 'same-origin',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(fpData)
                });

                // Mark as reported for the lifecycle of the browser tab
                sessionStorage.setItem('fp_reported', 'true');
                console.log("Security Event: Fingerprint reported.");
            } catch (err) {
                console.error("Security Event: Fingerprint failure.", err);
            }
        }
    });
</script>
{% endblock %}
