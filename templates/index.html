<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Alien Cargo - Game Generator</title>
    <style>
        /* Minimal CSS, JS handles layout. */
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }
        #toggle-btn {
            background: #3a7bd5;
            color: #fff;
            border: none;
            cursor: pointer;
            font-weight: bold;
            font-size: 20px;
            z-index: 100;
        }
        #toggle-btn:hover { background: #00d2ff; }

        iframe {
            border: none;
            background-color: #000;
        }
    </style>
</head>
<body>
    <button id="toggle-btn">&lt;</button>

    <div id="prompt-area">
        <h1 style="color: #00d2ff; margin-bottom: 5px;">Alien Cargo 🛸</h1>
        <p style="color: #aaa; margin-top: 0;">AI-Powered Instant Game Generator</p>
        <textarea id="game-desc" placeholder="Describe your game..."></textarea>
        <button id="create-btn">Create Game</button>
        <div id="loading" style="display: none; color: #00d2ff; margin-top: 15px;">
            <span id="loading-text">Compiling game logic...</span>
        </div>
    </div>

    <div id="game-area">
        <iframe id="game-frame" sandbox="allow-scripts allow-same-origin" scrolling="no"></iframe>
    </div>

    <script>
        // Define endpoints and state.
        const FLASK_API_URL = "/generate_game";
        let isGameView = false;

        // Grab DOM elements.
        const toggleBtn = document.getElementById('toggle-btn');
        const promptArea = document.getElementById('prompt-area');
        const gameArea = document.getElementById('game-area');
        const iframe = document.getElementById('game-frame');
        const createBtn = document.getElementById('create-btn');

        // JS enforced layout.
        function applyLayout() {
            console.log("UI Event: Applying grid layout.");

            document.body.style.display = 'grid';
            document.body.style.gridTemplateColumns = 'repeat(32, 1fr)';
            document.body.style.gridTemplateRows = '100vh';

            // Style Toggle Button.
            toggleBtn.style.height = '100vh';
            toggleBtn.style.width = '100%';

            // Style Prompt Area.
            promptArea.style.display = 'flex';
            promptArea.style.flexDirection = 'column';
            promptArea.style.alignItems = 'center';
            promptArea.style.justifyContent = 'center';
            promptArea.style.padding = '20px';
            promptArea.style.boxSizing = 'border-box';

            // Style Prompt Inputs.
            const textarea = document.getElementById('game-desc');
            textarea.style.width = '100%';
            textarea.style.maxWidth = '600px';
            textarea.style.height = '120px';
            textarea.style.marginBottom = '15px';
            textarea.style.background = '#1e1e1e';
            textarea.style.color = '#fff';
            textarea.style.padding = '10px';

            createBtn.style.padding = '10px 20px';
            createBtn.style.background = 'linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%)';
            createBtn.style.color = '#fff';
            createBtn.style.border = 'none';
            createBtn.style.cursor = 'pointer';

            // Style Game Area.
            gameArea.style.margin = '16px';
            gameArea.style.padding = '16px';
            gameArea.style.boxSizing = 'border-box';
            gameArea.style.display = 'flex';
            gameArea.style.justifyContent = 'center';
            gameArea.style.alignItems = 'center';

            // Fixed 800x450 Canvas Rule.
            iframe.style.width = '800px';
            iframe.style.height = '450px';
            iframe.style.maxWidth = '100%';
            iframe.style.maxHeight = '100%';

            updateViewState();
        }

        // Handle view switching.
        function updateViewState() {
            console.log(`UI Event: View state -> Game:${isGameView}`);
            if (isGameView) {
                // Game mode explicitly on row 1.
                toggleBtn.style.gridColumn = '1 / 2';
                toggleBtn.style.gridRow = '1';
                toggleBtn.innerHTML = '&gt;';

                promptArea.style.display = 'none';

                gameArea.style.display = 'flex';
                gameArea.style.gridColumn = '2 / 33';
                gameArea.style.gridRow = '1';
            } else {
                // Prompt mode explicitly on row 1.
                toggleBtn.style.gridColumn = '32 / 33';
                toggleBtn.style.gridRow = '1';
                toggleBtn.innerHTML = '&lt;';

                promptArea.style.display = 'flex';
                promptArea.style.gridColumn = '1 / 32';
                promptArea.style.gridRow = '1';

                gameArea.style.display = 'none';
            }
        }

        // Toggle button click logic.
        toggleBtn.addEventListener('click', () => {
            console.log("UI Event: Toggle button clicked.");
            isGameView = !isGameView;
            updateViewState();
        });

        // Initialize layout constraints.
        applyLayout();

        // Handle text changes.
        document.getElementById('game-desc').addEventListener('input', () => {
             console.log("UI Event: Textarea input modified.");
        });

        // Handle generation request.
        createBtn.addEventListener('click', async () => {
            console.log("UI Event: Create button clicked.");
            const descInput = document.getElementById('game-desc').value.trim();
            console.log(`Data Event: Input len: ${descInput.length}`);

            if (!descInput) {
                console.warn("Validation: Empty description blocked.");
                alert("Please describe your game!");
                return;
            }

            const loading = document.getElementById('loading');

            // UI Loading state.
            console.log("UI State: Enabling loading overlay.");
            createBtn.disabled = true;
            createBtn.innerText = "Generating...";
            loading.style.display = 'block';
            iframe.srcdoc = "";

            // Dynamic Progress Bar.
            let progressContainer = document.getElementById('progress-container');
            if (!progressContainer) {
                console.log("UI Event: Building progress bar.");
                progressContainer = document.createElement('div');
                progressContainer.id = 'progress-container';
                progressContainer.style.width = '100%';
                progressContainer.style.height = '10px';
                progressContainer.style.background = '#333';
                progressContainer.style.marginTop = '10px';

                const bar = document.createElement('div');
                bar.id = 'progress-bar';
                bar.style.width = '0%';
                bar.style.height = '100%';
                bar.style.background = '#00d2ff';
                bar.style.transition = 'width 0.2s linear';

                progressContainer.appendChild(bar);
                loading.appendChild(progressContainer);
            }

            const progressBar = document.getElementById('progress-bar');
            progressBar.style.width = '0%';

            let avgTime = parseInt(localStorage.getItem('alien_cargo_avg_time')) || 15000;
            let startTime = Date.now();
            console.log(`UI Event: Start progress. Avg: ${avgTime}ms`);

            let progressInterval = setInterval(() => {
                let elapsed = Date.now() - startTime;
                let progress = Math.min(90, (elapsed / avgTime) * 100);
                progressBar.style.width = `${progress}%`;
            }, 200);

            // POST Payload.
            const payload = { description: descInput };
            console.log("Network Event: POST initiated.");

            try {
                const response = await fetch(FLASK_API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                console.log(`Network Event: Status ${response.status}`);
                if (!response.ok) throw new Error(`HTTP error: ${response.status}`);

                const data = await response.json();
                console.log("Data Event: Payload parsed.");
                if (data.error) throw new Error(data.error);

                // Stop progress.
                clearInterval(progressInterval);
                progressBar.style.width = '100%';
                console.log("UI Event: Progress completed.");

                if (data.duration_ms) {
                    let newAvg = (avgTime + data.duration_ms) / 2;
                    localStorage.setItem('alien_cargo_avg_time', newAvg.toString());
                    console.log(`Storage: Avg updated to ${newAvg}ms.`);
                }

                // Load Game.
                console.log("UI State: Injecting game HTML.");
                iframe.srcdoc = data.game_html;

                // Auto switch view.
                isGameView = true;
                updateViewState();

            } catch (error) {
                console.error("Error Event: API failed.", error);
                clearInterval(progressInterval);
                alert("Generation failed. See console.");
            } finally {
                // Restore UI.
                console.log("UI State: Restoring interface.");
                setTimeout(() => {
                    createBtn.disabled = false;
                    createBtn.innerText = "Create Game";
                    loading.style.display = 'none';
                    progressBar.style.width = '0%';
                }, 500);
            }
        });
    </script>
</body>
</html>
