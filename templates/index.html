{% extends "base.html" %}
{% block head %}
<style>
    #app-container {
        display: grid;
        grid-template-columns: repeat(32, 1fr);
        grid-template-rows: calc(100vh - 48px);
        width: 100vw;
        overflow: hidden;
        margin-top: 48px;
    }
    #toggle-btn {
        background: #3a7bd5;
        color: #fff;
        border: none;
        cursor: pointer;
        font-weight: bold;
        font-size: 20px;
        z-index: 100;
        height: 100%;
        width: 100%;
    }
    #toggle-btn:hover { background: #00d2ff; }
    iframe {
        border: none;
        background-color: #000;
        outline: none;
        width: 100%;
        height: 100%;
    }
    #prompt-area {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 20px;
        box-sizing: border-box;
        position: relative;
    }
    #game-desc {
        width: 100%;
        max-width: 600px;
        height: 120px;
        margin-bottom: 15px;
        background: #1e1e1e;
        color: #fff;
        padding: 10px;
        border: 1px solid #333;
    }
    #create-btn {
        padding: 10px 20px;
        background: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%);
        color: #fff;
        border: none;
        cursor: pointer;
        font-weight: bold;
    }
    #game-area {
        margin: 0;
        padding: 16px;
        box-sizing: border-box;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #000;
    }
    #game-frame {
        width: 800px;
        height: 450px;
        max-width: 100%;
        max-height: 100%;
        box-shadow: 0 0 20px rgba(0, 210, 255, 0.2);
    }
</style>
{% endblock %}
{% block content %}
<div id="app-container">
    <button id="toggle-btn" title="Toggle View">&lt;</button>
    <div id="prompt-area">
        <h1 style="color: #00d2ff; margin-bottom: 5px;">Alien Cargo 🛸</h1>
        <p style="color: #aaa; margin-top: 0;">AI-Powered Instant Game Generator</p>
        <p style="color: #666; font-size: 12px; margin-top: -10px;">Cost: 1 Credit</p>
        <textarea id="game-desc" placeholder="Describe your game..." maxlength="2000"></textarea>
        <button id="create-btn">Create Game</button>
        <div id="loading" style="display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.9); color: #00d2ff; flex-direction: column; justify-content: center; align-items: center; z-index: 10;">
            <h2 id="loading-text" style="margin-bottom: 20px;">Engaging Hyperdrive...</h2>
            <div id="progress-container" style="width: 80%; max-width: 400px; height: 12px; background: #222; border-radius: 6px; overflow: hidden; border: 1px solid #333;">
                <div id="progress-bar" style="width: 0%; height: 100%; background: linear-gradient(90deg, #00d2ff, #3a7bd5); transition: width 0.3s ease;"></div>
            </div>
            <p id="status-update" style="margin-top: 15px; color: #666; font-size: 12px;">Syncing with AIManager...</p>
        </div>
    </div>
    <div id="game-area" style="display: none;">
        <iframe id="game-frame"
                allow="autoplay; fullscreen;"
                tabindex="0"
                scrolling="no"
                src="about:blank">
        </iframe>
    </div>
</div>
<script>
    const FLASK_API_URL = "/generate_game";
    let isGameView = false;
    const BACKEND_AVG_TIME = {{ avg_time|default(15000)|int }};
    const toggleBtn = document.getElementById('toggle-btn');
    const promptArea = document.getElementById('prompt-area');
    const gameArea = document.getElementById('game-area');
    const iframe = document.getElementById('game-frame');
    const createBtn = document.getElementById('create-btn');
    const progressBar = document.getElementById('progress-bar');
    const loadingOverlay = document.getElementById('loading');
    const descInputBox = document.getElementById('game-desc');

    // Force focus into game iframe.
    function forceGameFocus() {
        if (!isGameView || !iframe) return;
        console.log("Enforcement: Hammering focus into game world.");
        iframe.focus();
        if (iframe.contentWindow) {
            iframe.contentWindow.focus();
            iframe.contentWindow.postMessage({ type: 'engine_focus' }, '*');
        }
    }

    // Track text input interactions.
    descInputBox.addEventListener('input', () => {
        console.log("UI Event: Description text updated.");
    });

    // Transfer keyboard focus to game.
    window.addEventListener('keydown', (e) => {
        if (isGameView && document.activeElement !== iframe) {
            console.log(`Input Bridge: Transferring ${e.key} focus.`);
            forceGameFocus();
        }
    });

    // Update UI view states.
    function updateViewState() {
        console.log(`UI Event: View state -> Game:${isGameView}`);
        if (isGameView) {
            toggleBtn.style.gridColumn = '1 / 2';
            toggleBtn.innerHTML = '&gt;';
            promptArea.style.display = 'none';
            gameArea.style.display = 'flex';
            gameArea.style.gridColumn = '2 / 33';
            gameArea.style.gridRow = '1';
            loadingOverlay.style.display = 'none';

            requestAnimationFrame(() => {
                setTimeout(forceGameFocus, 10);
                setTimeout(forceGameFocus, 300);
            });
        } else {
            toggleBtn.style.gridColumn = '32 / 33';
            toggleBtn.innerHTML = '&lt;';
            promptArea.style.display = 'flex';
            promptArea.style.gridColumn = '1 / 32';
            promptArea.style.gridRow = '1';
            gameArea.style.display = 'none';
        }
    }

    // Ensure initial layout runs properly to prevent squashed views
    updateViewState();

    toggleBtn.addEventListener('click', () => {
        console.log("UI Event: Toggle button clicked.");
        isGameView = !isGameView;
        updateViewState();
    });

    iframe.onload = () => {
        if (isGameView) {
            console.log("UI Event: Iframe loaded. Final focus.");
            forceGameFocus();
        }
    };

    createBtn.addEventListener('click', async () => {
        const descInput = descInputBox.value.trim();
        console.log(`Data Event: Input length ${descInput.length}`);

        if (!descInput) {
            console.warn("Validation: Empty description blocked.");
            alert("Describe the game first, captain!");
            return;
        }

        createBtn.disabled = true;
        createBtn.innerText = "Generating...";
        loadingOverlay.style.display = 'flex';
        iframe.srcdoc = "";
        progressBar.style.width = '0%';

        let startTime = Date.now();
        let progressInterval = setInterval(() => {
            let elapsed = Date.now() - startTime;
            let progress = Math.min(98, (elapsed / BACKEND_AVG_TIME) * 100);
            progressBar.style.width = `${progress}%`;
            if (progress > 80) {
                document.getElementById('status-update').innerText = "Almost there... finalizing code.";
            }
        }, 200);

        try {
            const response = await fetch(FLASK_API_URL, {
                method: 'POST',
                credentials: 'same-origin', // Send session cookies securely.
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ description: descInput })
            });

            const data = await response.json();

            if (!response.ok) {
                if (response.status === 401) window.location.href = "{{ url_for('auth.login') }}";
                if (response.status === 403) window.location.href = "{{ url_for('billing.tiers') }}";
                throw new Error(data.error || "Generation failed.");
            }

            console.log("Network Event: Game received successfully.");
            clearInterval(progressInterval);
            progressBar.style.width = '100%';

            // Update top bar with exact ID to match base.html adjustments
            const navCredits = document.getElementById('credit-amount');
            if (navCredits && data.credits_remaining !== undefined) {
                navCredits.innerText = data.credits_remaining + " Credits";
            }

            console.log("UI State: Assigning srcdoc.");
            iframe.srcdoc = data.game_html;

            setTimeout(() => {
                isGameView = true;
                updateViewState();
            }, 50);

        } catch (error) {
            console.error("Error Event: Generation failed.", error);
            clearInterval(progressInterval);
            alert(error.message);
            loadingOverlay.style.display = 'none';
        } finally {
            console.log("UI State: Generation routine finished.");
            createBtn.disabled = false;
            createBtn.innerText = "Create Game";
        }
    });

    gameArea.addEventListener('mousedown', () => {
        console.log("UI Interaction: Padding mousedown focus.");
        forceGameFocus();
    });
</script>

<script>
    // Report fingerprint on page load.
    document.addEventListener('DOMContentLoaded', async () => {
        if (typeof gatherFingerprintData === 'function') {
            try {
                const email = "{{ session.get('email', '') }}";
                const fpData = await gatherFingerprintData(email);

                await fetch('/billing/report_standard', {
                    method: 'POST',
                    credentials: 'same-origin', // Allow session cookie interaction.
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(fpData)
                });

                console.log("Security Event: Fingerprint reported.");
            } catch (err) {
                console.error("Security Event: Fingerprint failure.", err);
            }
        }
    });
</script>
{% endblock %}
