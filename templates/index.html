{% extends "base.html" %}
{% block head %}
<style>
    #app-container {
        display: grid;
        grid-template-columns: repeat(32, 1fr);
        grid-template-rows: calc(100vh - 61px); /* Nav height and borders. */
        width: 100vw;
        overflow: hidden;
    }
    #toggle-btn {
        background: #3a7bd5;
        color: #fff;
        border: none;
        cursor: pointer;
        font-weight: bold;
        font-size: 20px;
        z-index: 100;
        height: 100%;
        width: 100%;
    }
    #toggle-btn:hover { background: #00d2ff; }
    iframe {
        border: none;
        background-color: #000;
        outline: none; /* Hide focus ring. */
    }
    #prompt-area {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 20px;
        box-sizing: border-box;
        position: relative;
    }
    #game-desc {
        width: 100%;
        max-width: 600px;
        height: 120px;
        margin-bottom: 15px;
        background: #1e1e1e;
        color: #fff;
        padding: 10px;
        border: 1px solid #333;
    }
    #create-btn {
        padding: 10px 20px;
        background: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%);
        color: #fff;
        border: none;
        cursor: pointer;
        font-weight: bold;
    }
    #game-area {
        margin: 16px;
        padding: 16px;
        box-sizing: border-box;
        display: flex;
        justify-content: center;
        align-items: center;
    }
    #game-frame {
        width: 800px;
        height: 450px;
        max-width: 100%;
        max-height: 100%;
    }
</style>
{% endblock %}
{% block content %}
<div id="app-container">
    <button id="toggle-btn">&lt;</button>
    <div id="prompt-area">
        <h1 style="color: #00d2ff; margin-bottom: 5px;">Alien Cargo 🛸</h1>
        <p style="color: #aaa; margin-top: 0;">AI-Powered Instant Game Generator</p>
        <p style="color: #666; font-size: 12px; margin-top: -10px;">Cost: 1 Credit</p>
        <textarea id="game-desc" placeholder="Describe your game..."></textarea>
        <button id="create-btn">Create Game</button>
        <div id="loading" style="display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.8); color: #00d2ff; flex-direction: column; justify-content: center; align-items: center; z-index: 10;">
            <h2 id="loading-text" style="margin-bottom: 20px;">Creating Game...</h2>
            <div id="progress-container" style="width: 80%; max-width: 400px; height: 10px; background: #333; border-radius: 5px; overflow: hidden;">
                <div id="progress-bar" style="width: 0%; height: 100%; background: #00d2ff; transition: width 0.2s linear;"></div>
            </div>
        </div>
    </div>
    <div id="game-area" style="display: none;">
        <iframe id="game-frame" allow="autoplay; fullscreen; pointer-lock" tabindex="0" scrolling="no"></iframe>
    </div>
</div>
<script>
    const FLASK_API_URL = "/generate_game";
    let isGameView = false;
    const toggleBtn = document.getElementById('toggle-btn');
    const promptArea = document.getElementById('prompt-area');
    const gameArea = document.getElementById('game-area');
    const iframe = document.getElementById('game-frame');
    const createBtn = document.getElementById('create-btn');

    function updateViewState() {
        console.log(`UI Event: View state -> Game:${isGameView}`);
        if (isGameView) {
            toggleBtn.style.gridRow = '1';
            toggleBtn.style.gridColumn = '1 / 2';
            toggleBtn.innerHTML = '&gt;';
            promptArea.style.display = 'none';
            gameArea.style.gridRow = '1';
            gameArea.style.display = 'flex';
            gameArea.style.gridColumn = '2 / 33';
            console.log("UI Event: Applied Game View layout.");
        } else {
            toggleBtn.style.gridRow = '1';
            toggleBtn.style.gridColumn = '32 / 33';
            toggleBtn.innerHTML = '&lt;';
            promptArea.style.gridRow = '1';
            promptArea.style.display = 'flex';
            promptArea.style.gridColumn = '1 / 32';
            gameArea.style.display = 'none';
            console.log("UI Event: Applied Prompt View layout.");
        }
    }

    toggleBtn.addEventListener('click', () => {
        console.log("UI Event: Toggle button clicked.");
        isGameView = !isGameView;
        updateViewState();
        if (isGameView) {
            iframe.focus();
            if (iframe.contentWindow) iframe.contentWindow.focus();
            console.log("UI Event: Iframe focused via toggle.");
        }
    });

    updateViewState();

    iframe.onload = () => {
        console.log("UI Event: Iframe completely loaded.");
        iframe.focus();
        if (iframe.contentWindow) iframe.contentWindow.focus();
    };

    document.getElementById('game-desc').addEventListener('input', (e) => {
         console.log(`UI Event: Textarea input. Len: ${e.target.value.length}`);
    });

    createBtn.addEventListener('click', async () => {
        console.log("UI Event: Create button clicked.");
        const descInput = document.getElementById('game-desc').value.trim();
        console.log(`Data Event: Input len: ${descInput.length}`);

        if (!descInput) {
            console.warn("Validation: Empty description blocked.");
            alert("Please describe your game!");
            return;
        }

        const loading = document.getElementById('loading');
        console.log("UI State: Enabling loading overlay.");
        createBtn.disabled = true;
        createBtn.innerText = "Generating...";
        loading.style.display = 'flex';
        iframe.srcdoc = "";

        const progressBar = document.getElementById('progress-bar');
        progressBar.style.width = '0%';

        let avgTime = parseInt(localStorage.getItem('alien_cargo_avg_time')) || 15000;
        let startTime = Date.now();
        console.log(`UI Event: Start progress. Avg: ${avgTime}ms`);

        let progressInterval = setInterval(() => {
            let elapsed = Date.now() - startTime;
            let progress = Math.min(90, (elapsed / avgTime) * 100);
            progressBar.style.width = `${progress}%`;
        }, 200);

        const payload = { description: descInput };
        console.log("Network Event: POST initiated.");

        try {
            const response = await fetch(FLASK_API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            console.log(`Network Event: Status ${response.status}`);
            const data = await response.json();

            if (!response.ok) {
                if (response.status === 401) {
                    window.location.href = "{{ url_for('auth.login') }}";
                    throw new Error("Redirecting to login...");
                } else if (response.status === 403) {
                    window.location.href = "{{ url_for('billing.tiers') }}";
                    throw new Error("Redirecting to store...");
                }
                throw new Error(data.error || `HTTP error: ${response.status}`);
            }

            console.log("Data Event: Payload parsed.");
            clearInterval(progressInterval);
            progressBar.style.width = '100%';
            console.log("UI Event: Progress completed.");

            if (data.duration_ms) {
                let newAvg = (avgTime + data.duration_ms) / 2;
                localStorage.setItem('alien_cargo_avg_time', newAvg.toString());
                console.log(`Storage: Avg updated to ${newAvg}ms.`);
            }

            const navCredits = document.getElementById('nav-credits');
            if(navCredits && data.credits_remaining !== undefined) {
                navCredits.innerText = data.credits_remaining;
            }

            console.log("UI State: Injecting game HTML.");
            iframe.srcdoc = data.game_html;
            isGameView = true;
            updateViewState();

            setTimeout(() => {
                iframe.focus();
                if (iframe.contentWindow) iframe.contentWindow.focus();
                console.log("UI Event: Auto-focused iframe via timer.");
            }, 500);

        } catch (error) {
            console.error("Error Event: API failed.", error);
            clearInterval(progressInterval);
            alert(error.message || "Generation failed. See console.");
        } finally {
            console.log("UI State: Restoring interface.");
            setTimeout(() => {
                createBtn.disabled = false;
                createBtn.innerText = "Create Game";
                loading.style.display = 'none';
                progressBar.style.width = '0%';
            }, 500);
        }
    });
</script>

<script src="https://loginmanager.pythonanywhere.com/static/js/fingerprint.js"></script>
<script>
    // Gather and report user fingerprint.
    document.addEventListener('DOMContentLoaded', async () => {
        if (typeof gatherFingerprintData === 'function') {
            try {
                const email = "{{ session.get('email', '') }}";
                const fpData = await gatherFingerprintData(email);

                // Send report to proxy.
                const response = await fetch('/billing/report_standard', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(fpData)
                });

                if (response.ok) {
                    console.log("Network Event: Fingerprint reported successfully.");

                    // Fetch and update balance.
                    const credRes = await fetch('/billing/get_credits', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ fingerprint: fpData.fingerprint, email: email })
                    });

                    const credData = await credRes.json();
                    const navCredits = document.getElementById('nav-credits');
                    if (navCredits && credData.credits_remaining !== undefined) {
                        navCredits.innerText = credData.credits_remaining;
                    }
                }
            } catch (err) {
                console.error("Error Event: Fingerprint collection failed.", err);
            }
        }
    });
</script>
{% endblock %}
